<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-default.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', (event) => {
        window.katex = katex;
      });
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Noto+Sans+Arabic:wght@100..900&display=swap" rel="stylesheet">
    <title>E-Ujian AA</title>
    <style>
      #preloader {
        position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        background: #f8fafc; color: #10b981; font-family: sans-serif; gap: 20px; z-index: 9999; transition: background 0.3s;
      }
      .dark #preloader { background: #020617; }
      .spinner { width: 50px; height: 50px; border: 4px solid rgba(16, 185, 129, 0.1); border-top: 4px solid #10b981; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      .preloader-text { font-size: 11px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #10b981; margin: 0; }
    </style>
    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'system';
        const root = document.documentElement;
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          root.classList.add('dark');
        } else {
          root.classList.add('light');
        }
      })();
    </script>
  </head>
  <body class="min-h-screen bg-background font-sans antialiased">
    <div id="root">
      <div id="preloader">
        <div class="spinner"></div>
        <p class="preloader-text">E-UJIAN SYSTEM</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
