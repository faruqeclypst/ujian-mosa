name: Deploy to VPS

on:
  push:
    branches:
      - dev
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm run build
        env:
          # VITE_POCKETBASE_URL kini dinamis (otomatis deteksi domain)
          VITE_APP_NAME: "EXAM-AA"
          VITE_AUTH_USERNAME_DOMAIN: "https://assets.alfaruqasri.my.id"
          VITE_R2_BUCKET: "piket"
          VITE_R2_ENDPOINT: "https://fbb45dee06536009648061725236f3d9.r2.cloudflarestorage.com"
          VITE_R2_PUBLIC_BASE_URL: "https://pub-a1193e163fef41c9afc15d1334b8740b.r2.dev"
          VITE_R2_ACCESS_KEY_ID: ${{ secrets.VITE_R2_ACCESS_KEY_ID }}
          VITE_R2_SECRET_ACCESS_KEY: ${{ secrets.VITE_R2_SECRET_ACCESS_KEY }}
          VITE_R2_WORKER_URL: "https://r2-delete-worker.faruq-blogger.workers.dev"
          VITE_DISABLE_EXAMBRO_GUARD: "false"

      - name: Deploy to VPS via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "dist/*"
          target: "${{ secrets.REMOTE_DIR }}/pb_public/"
          strip_components: 1
          overwrite: true
