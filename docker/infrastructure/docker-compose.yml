services:
  master:
    image: pb-school-base:latest
    container_name: pb-master
    restart: always
    volumes:
      - pb_master_data:/pb/pb_data
      - /var/run/docker.sock:/var/run/docker.sock # Allows master to control docker
      - .:/pb/infrastructure # Allows master to update Caddy config
    environment:
      - PORT=8080
    networks:
      - pb_network

  caddy:

    image: caddy:latest
    container_name: caddy-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./config:/config
      - ./data:/data
      - ./schools.caddy:/etc/caddy/schools.caddy
    networks:
      - pb_network

networks:
  pb_network:
    name: pb_network
    driver: bridge

volumes:
  pb_master_data:
